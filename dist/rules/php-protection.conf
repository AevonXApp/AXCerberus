# =============================================================================
# AevonX Shield WAF — PHP Protection Rules v1.0.0
# Engine: Coraza (ModSecurity-compatible)
#
# Rule ID range: 2201–2299
# =============================================================================

# PHP Object Injection / deserialization attacks
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:(?:O:\d+:\"[a-z_]+\":\d+:\{|a:\d+:\{[is]:\d+))" \
    "id:2201,phase:2,deny,status:403,log,msg:'PHP - Object injection / deserialization',tag:'AEVONX/PHP_PROTECTION'"

# PHP code execution via eval, assert, preg_replace with /e
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:(?:eval\s*\(|assert\s*\(|preg_replace\s*\(\s*['\"][^'\"]*\/e))" \
    "id:2202,phase:2,deny,status:403,log,msg:'PHP - Code execution function',tag:'AEVONX/PHP_PROTECTION'"

# PHP system command execution functions
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:(?:system\s*\(|exec\s*\(|passthru\s*\(|shell_exec\s*\(|popen\s*\(|proc_open\s*\(|pcntl_exec\s*\())" \
    "id:2203,phase:2,deny,status:403,log,msg:'PHP - System command execution',tag:'AEVONX/PHP_PROTECTION'"

# PHP file manipulation functions in user input
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:(?:file_get_contents\s*\(|file_put_contents\s*\(|fopen\s*\(|readfile\s*\(|copy\s*\(|move_uploaded_file\s*\(|unlink\s*\())" \
    "id:2204,phase:2,deny,status:403,log,msg:'PHP - File manipulation function',tag:'AEVONX/PHP_PROTECTION'"

# PHP backdoor patterns
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:(?:base64_decode\s*\(\s*[\"\'][a-z0-9+\/=]{50,}|str_rot13\s*\(|gzinflate\s*\(|gzuncompress\s*\(|gzdecode\s*\())" \
    "id:2205,phase:2,deny,status:403,log,msg:'PHP - Backdoor pattern detected',tag:'AEVONX/PHP_PROTECTION'"

# PHP info disclosure via phpinfo()
SecRule REQUEST_URI|ARGS \
    "@rx (?i:phpinfo\s*\()" \
    "id:2206,phase:1,deny,status:403,log,msg:'PHP - phpinfo() disclosure',tag:'AEVONX/PHP_PROTECTION'"

# PHP variable variable exploitation $$var
SecRule ARGS|REQUEST_BODY \
    "@rx (?:\$\$[a-zA-Z_])" \
    "id:2207,phase:2,deny,status:403,log,msg:'PHP - Variable variable exploitation',tag:'AEVONX/PHP_PROTECTION'"

# PHP type juggling attacks via null byte or boolean payloads
SecRule ARGS|REQUEST_BODY \
    "@rx (?:(?:true|false|null|0x[0-9a-f]+)\s*(?:==|!=)\s*(?:['\"][^'\"]*['\"]|\d+))" \
    "id:2208,phase:2,deny,status:403,log,msg:'PHP - Type juggling attack',tag:'AEVONX/PHP_PROTECTION'"

# PHP mail header injection
SecRule ARGS|REQUEST_BODY \
    "@rx (?i:(?:bcc:|cc:|to:|content-type:|mime-version:|subject:).*(?:\r|\n|%0d|%0a))" \
    "id:2209,phase:2,deny,status:403,log,msg:'PHP - Mail header injection',tag:'AEVONX/PHP_PROTECTION'"

# Block direct access to PHP error log files
SecRule REQUEST_URI \
    "@rx (?i:(?:error_log|php_errors\.log|php-fpm\.log|slowlog))" \
    "id:2210,phase:1,deny,status:403,log,msg:'PHP - Error log access blocked',tag:'AEVONX/PHP_PROTECTION'"
