# =============================================================================
# AevonX Shield WAF — WordPress Protection Rules v1.0.0
# Engine: Coraza (ModSecurity-compatible)
#
# Rule ID range: 2101–2199
# =============================================================================

# Block xmlrpc.php (commonly abused for brute-force and DDoS amplification)
SecRule REQUEST_URI "@rx (?i:\/xmlrpc\.php$)" \
    "id:2101,phase:1,deny,status:403,log,msg:'WordPress - xmlrpc.php blocked',tag:'AEVONX/WORDPRESS_PROTECTION'"

# Block wp-login.php POST attempts (brute-force protection)
SecRule REQUEST_URI "@rx (?i:\/wp-login\.php$)" \
    "id:2102,phase:1,deny,status:403,log,msg:'WordPress - wp-login.php access blocked',tag:'AEVONX/WORDPRESS_PROTECTION'"

# Block direct access to wp-config.php
SecRule REQUEST_URI "@rx (?i:wp-config\.php)" \
    "id:2103,phase:1,deny,status:403,log,msg:'WordPress - wp-config.php access blocked',tag:'AEVONX/WORDPRESS_PROTECTION'"

# Block wp-admin ajax handler abuse (known vulnerable actions)
SecRule ARGS:action "@rx (?i:(?:revslider_show_image|showbiz_show_image|download_backup|duplicator_download|file_manager_upload))" \
    "id:2104,phase:2,deny,status:403,log,msg:'WordPress - Suspicious admin-ajax action',tag:'AEVONX/WORDPRESS_PROTECTION'"

# Block theme/plugin file editor
SecRule REQUEST_URI "@rx (?i:\/wp-admin\/(?:theme-editor|plugin-editor)\.php)" \
    "id:2105,phase:1,deny,status:403,log,msg:'WordPress - File editor access blocked',tag:'AEVONX/WORDPRESS_PROTECTION'"

# Block direct access to wp-includes
SecRule REQUEST_URI "@rx (?i:\/wp-includes\/(?:.*\.php$|js\/tinymce\/langs\/))" \
    "id:2106,phase:1,deny,status:403,log,msg:'WordPress - Direct wp-includes PHP access',tag:'AEVONX/WORDPRESS_PROTECTION'"

# Block WordPress user enumeration via REST API
SecRule REQUEST_URI "@rx (?i:\/wp-json\/wp\/v2\/users)" \
    "id:2107,phase:1,deny,status:403,log,msg:'WordPress - User enumeration via REST API',tag:'AEVONX/WORDPRESS_PROTECTION'"

# Block WordPress user enumeration via author query
SecRule QUERY_STRING "@rx (?i:author=\d+)" \
    "id:2108,phase:1,deny,status:403,log,msg:'WordPress - User enumeration via author param',tag:'AEVONX/WORDPRESS_PROTECTION'"

# Block upload of dangerous file types via WordPress upload handlers
SecRule FILES_NAMES "@rx (?i:\.(?:php|php5|phtml|pht|phar|cgi|pl|py|sh|bash|exe|bat|cmd|com|scr|vbs|js)$)" \
    "id:2109,phase:2,deny,status:403,log,msg:'WordPress - Dangerous file upload attempt',tag:'AEVONX/WORDPRESS_PROTECTION'"

# Block access to WordPress debug log
SecRule REQUEST_URI "@rx (?i:\/wp-content\/debug\.log)" \
    "id:2110,phase:1,deny,status:403,log,msg:'WordPress - Debug log access blocked',tag:'AEVONX/WORDPRESS_PROTECTION'"

# Block known vulnerable WordPress plugin paths
SecRule REQUEST_URI "@rx (?i:\/wp-content\/plugins\/(?:revslider|showbiz|gravityforms-download-monitor|wp-file-manager|easy-wp-smtp|duplicator|wordfence|all-in-one-wp-security)\/)" \
    "id:2111,phase:1,pass,log,msg:'WordPress - Known vulnerable plugin path accessed',tag:'AEVONX/WORDPRESS_PROTECTION'"
