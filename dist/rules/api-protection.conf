# =============================================================================
# AevonX Shield WAF — API Protection Rules v1.0.0
# Engine: Coraza (ModSecurity-compatible)
#
# Rule ID range: 2001–2099
# =============================================================================

# Block malformed JSON bodies on API endpoints
# DISABLED: This rule blocks ALL non-JSON requests (GET, form POST, etc.)
# TODO: Re-enable with proper Content-Type chain once Coraza v3 chain compat is verified
# SecRule REQUEST_HEADERS:Content-Type "@rx application/json" \
#     "id:2001,phase:2,chain,log,msg:'API - Malformed JSON body',tag:'AEVONX/API_PROTECTION'"
#     SecRule REQUEST_BODY "!@rx ^[\s]*[\[{]" "deny,status:400"

# Block extremely large JSON payloads (> 5MB)
SecRule REQUEST_HEADERS:Content-Length "@gt 5242880" \
    "id:2002,phase:1,deny,status:413,log,msg:'API - Payload too large',tag:'AEVONX/API_PROTECTION'"

# Prevent mass assignment attacks via unexpected fields in JSON
SecRule REQUEST_BODY \
    "@rx (?i:\"(?:is_admin|role|permissions|password_hash|api_key|secret|token|access_level|admin|superuser|privilege)\")" \
    "id:2003,phase:2,deny,status:403,log,msg:'API - Mass assignment attempt (sensitive field)',tag:'AEVONX/API_PROTECTION'"

# GraphQL introspection abuse
SecRule REQUEST_BODY \
    "@rx (?i:__schema|__type|introspectionQuery)" \
    "id:2004,phase:2,deny,status:403,log,msg:'API - GraphQL introspection blocked',tag:'AEVONX/API_PROTECTION'"

# GraphQL depth bomb (nested queries causing resource exhaustion)
SecRule REQUEST_BODY \
    "@rx (?i:\{[^{}]*\{[^{}]*\{[^{}]*\{[^{}]*\{)" \
    "id:2005,phase:2,deny,status:403,log,msg:'API - GraphQL depth bomb detected',tag:'AEVONX/API_PROTECTION'"

# XML External Entity (XXE) attacks
SecRule REQUEST_BODY \
    "@rx (?i:<!(?:DOCTYPE|ENTITY)[^>]*(?:SYSTEM|PUBLIC))" \
    "id:2006,phase:2,deny,status:403,log,msg:'API - XXE attack detected',tag:'AEVONX/API_PROTECTION'"

# Server-Side Request Forgery (SSRF) indicators in parameters
SecRule ARGS \
    "@rx (?i:(?:http|ftp)s?://(?:127\.0\.0\.1|localhost|0\.0\.0\.0|10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|::1|\[::1\]))" \
    "id:2007,phase:2,deny,status:403,log,msg:'API - SSRF attempt (internal IP)',tag:'AEVONX/API_PROTECTION'"

# Block HTTP methods that should not be used on typical API endpoints
SecRule REQUEST_METHOD "@rx ^(?:OPTIONS|TRACE|TRACK|CONNECT|DEBUG)$" \
    "id:2008,phase:1,deny,status:405,log,msg:'API - Disallowed HTTP method',tag:'AEVONX/API_PROTECTION'"

# Prevent CORS abuse via wildcard Origin with credentials
SecRule REQUEST_HEADERS:Origin "@rx ^https?://[*]" \
    "id:2009,phase:1,deny,status:403,log,msg:'API - CORS wildcard Origin abuse',tag:'AEVONX/API_PROTECTION'"

# JWT token in query string (should be in Authorization header)
SecRule QUERY_STRING "@rx (?i:(?:token|jwt|access_token|auth)=ey[A-Za-z0-9_-]+\.)" \
    "id:2010,phase:1,deny,status:403,log,msg:'API - JWT token exposed in URL',tag:'AEVONX/API_PROTECTION'"
