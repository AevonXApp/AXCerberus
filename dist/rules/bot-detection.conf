# =============================================================================
# AevonX Shield WAF — Bot & Scanner Detection Rules v2.0.0
# Engine: Coraza (ModSecurity-compatible)
#
# Rule ID range: 1901–1999
# =============================================================================

# Advanced scanner detection — extended patterns
SecRule REQUEST_HEADERS:User-Agent \
    "@rx (?i:(?:wpscan|cmsmap|joomscan|droopescan|whatweb|nessus|qualys|openvas|burp|zap|w3af|skipfish|arachni|vega|grabber|xsstrike|commix|sqlninja|bbqsql|jsql|pangolin|webscarab|webinspect|retina|netsparker|probely|detectify|intruder|pentest|offensive|security|scanner|vuln|exploit|attack|pwn))" \
    "id:1901,phase:1,deny,status:403,log,msg:'Bot - Advanced scanner detected',tag:'AEVONX/BOT_DETECTION'"

# Scripting language User-Agents (non-browser automated tools)
SecRule REQUEST_HEADERS:User-Agent \
    "@rx (?i:^(?:ruby|perl|php|python|java|node|axios|httpie|rest-client|reqwest|ureq|hyper|async-http|okhttp|retrofit|undici)[\/ ])" \
    "id:1902,phase:1,deny,status:403,log,msg:'Bot - Scripting language client',tag:'AEVONX/BOT_DETECTION'"

# Fake Googlebot (User-Agent says Googlebot but IP doesn't match Google ranges)
# Note: This rule catches the most obvious fakes. Full verification requires reverse DNS in Go.
SecRule REQUEST_HEADERS:User-Agent "@rx (?i:googlebot)" \
    "id:1903,phase:1,pass,nolog,setvar:tx.claims_googlebot=1,tag:'AEVONX/BOT_DETECTION'"

# Headless browser indicators
SecRule REQUEST_HEADERS:User-Agent \
    "@rx (?i:(?:headlesschrome|phantomjs|slimerjs|htmlunit|zombie\.js|splash|puppeteer|playwright|selenium|webdriver|nightmare))" \
    "id:1904,phase:1,deny,status:403,log,msg:'Bot - Headless browser detected',tag:'AEVONX/BOT_DETECTION'"

# Missing common headers that all browsers send
SecRule &REQUEST_HEADERS:Accept "@eq 0" \
    "id:1905,phase:1,deny,status:403,log,msg:'Bot - Missing Accept header',tag:'AEVONX/BOT_DETECTION'"

# Unusual request ordering — bots often request /robots.txt then immediately crawl sensitive paths
SecRule REQUEST_URI "@rx (?i:(?:robots\.txt|sitemap\.xml|\.well-known))" \
    "id:1906,phase:1,pass,nolog,setvar:tx.probing=1,tag:'AEVONX/BOT_DETECTION'"

# Rapid-fire requests to admin paths (likely brute-force or scanning)
SecRule REQUEST_URI "@rx (?i:(?:\/admin|\/login|\/wp-login|\/wp-admin|\/administrator|\/manager|\/console|\/dashboard|\/cpanel))" \
    "id:1907,phase:1,pass,log,msg:'Bot - Admin path probe',tag:'AEVONX/BOT_DETECTION'"

# Known malicious bot signatures
SecRule REQUEST_HEADERS:User-Agent \
    "@rx (?i:(?:zgrab|censys|shodan|masscan|internetmeasur|project25499|researchscan|expanseinc))" \
    "id:1908,phase:1,deny,status:403,log,msg:'Bot - Internet-wide scanner',tag:'AEVONX/BOT_DETECTION'"

# Empty or very short User-Agent (< 10 chars, likely automated)
SecRule REQUEST_HEADERS:User-Agent "@rx ^.{0,9}$" \
    "id:1909,phase:1,deny,status:403,log,msg:'Bot - Suspiciously short User-Agent',tag:'AEVONX/BOT_DETECTION'"

# AI crawler bots
SecRule REQUEST_HEADERS:User-Agent \
    "@rx (?i:(?:gptbot|chatgpt-user|google-extended|claudebot|anthropic|cohere-ai|bytespider|ccbot|amazonbot|meta-externalagent|facebookbot|perplexitybot|youbot|petalbot|semrushbot|ahrefsbot|mj12bot|dotbot|blexbot))" \
    "id:1910,phase:1,pass,log,msg:'Bot - AI/SEO crawler detected',tag:'AEVONX/BOT_DETECTION'"
